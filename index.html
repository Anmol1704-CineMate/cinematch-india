<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta name="description" content="CineMatch India - AI Hindi Movie Recommendation App. Rate movies to unlock your personalized recommendation list.">
    <meta name="theme-color" content="#08080f">
    
    <title>CineMatch India | AI Hindi Movie Recommendations</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset & Core Design System */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-base: #08080f;
            --bg-surface: #121220;
            --bg-surface-elevated: #1a1a2e;
            --bg-surface-hover: #23233a;
            
            --color-primary: #e50914;
            --color-primary-hover: #ff1f2d;
            --color-primary-glow: rgba(229, 9, 20, 0.25);
            
            --color-gold: #ffb800;
            --color-gold-glow: rgba(255, 184, 0, 0.2);
            
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            
            --border-color: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(229, 9, 20, 0.5);
            
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 20px;
            
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.7);
            
            --font-display: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(229, 9, 20, 0.12) 0%, transparent 60%),
                radial-gradient(circle at 0% 100%, rgba(255, 184, 0, 0.03) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-surface-elevated);
            border: 2px solid var(--bg-base);
            border-radius: var(--radius-sm);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--bg-surface-hover);
        }

        /* Layout */
        .app-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 2rem;
            background: rgba(18, 18, 32, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-top: 1rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--text-primary);
        }

        .brand h1 {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 30%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .brand-logo {
            font-size: 1.8rem;
            filter: drop-shadow(0 0 8px rgba(229, 9, 20, 0.4));
            animation: pulse-logo 3s ease-in-out infinite;
        }

        @keyframes pulse-logo {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* General Card UI */
        .content-card {
            background: rgba(18, 18, 32, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .screen {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        /* Screen 1: Welcome & Name */
        .welcome-card {
            text-align: center;
            padding: 2rem 1.5rem;
            background: linear-gradient(135deg, rgba(229, 9, 20, 0.06) 0%, rgba(18, 18, 32, 0.7) 100%);
            border-radius: var(--radius-md);
            border: 1px solid rgba(229, 9, 20, 0.15);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .welcome-card h2 {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .welcome-card p {
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .name-section {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .form-label {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-label svg {
            width: 18px;
            height: 18px;
            color: var(--color-primary);
        }

        .input-text {
            background: rgba(8, 8, 15, 0.6);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 0.85rem 1rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .input-text:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 10px var(--color-primary-glow);
            background: rgba(8, 8, 15, 0.8);
        }

        /* Movie Quiz Grid */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.75rem;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title svg {
            width: 22px;
            height: 22px;
            color: var(--color-primary);
        }

        .movies-quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .movie-quiz-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 1.25rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .movie-quiz-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .quiz-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .quiz-card-icon {
            font-size: 1.2rem;
            filter: drop-shadow(0 0 6px rgba(229, 9, 20, 0.3));
        }

        .quiz-card-number {
            font-weight: 700;
            font-family: var(--font-display);
        }

        .quiz-card-title {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
            min-height: 3.4rem;
            display: flex;
            align-items: center;
        }

        /* Rating Buttons */
        .rating-buttons {
            display: flex;
            gap: 0.5rem;
            width: 100%;
        }

        .btn-rate {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 0.6rem 0.4rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            color: var(--text-secondary);
        }

        .btn-rate:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        .btn-rate .emoji {
            font-size: 1.2rem;
        }

        .btn-rate .label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* Rating Selected States */
        .btn-rate.active.btn-like {
            background: rgba(16, 185, 129, 0.12);
            border-color: #10b981;
            color: #34d399;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }

        .btn-rate.active.btn-meh {
            background: rgba(245, 158, 11, 0.12);
            border-color: #f59e0b;
            color: #fbbf24;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.2);
        }

        .btn-rate.active.btn-dislike {
            background: rgba(239, 68, 68, 0.12);
            border-color: #ef4444;
            color: #f87171;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
        }

        /* Sticky Trigger Bar */
        .trigger-bar {
            background: rgba(18, 18, 32, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(229, 9, 20, 0.2);
            border-radius: var(--radius-md);
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            bottom: 1.5rem;
            z-index: 100;
            box-shadow: var(--shadow-lg), 0 0 20px rgba(229, 9, 20, 0.1);
            animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slide-up {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        #rating-progress-text {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--color-primary) 0%, #a8000a 100%);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            padding: 0.85rem 1.75rem;
            font-size: 1rem;
            font-family: var(--font-display);
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(229, 9, 20, 0.3);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(229, 9, 20, 0.45);
            background: linear-gradient(135deg, var(--color-primary-hover) 0%, var(--color-primary) 100%);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: var(--bg-surface-hover);
            color: var(--text-muted);
            box-shadow: none;
            border: 1px solid var(--border-color);
        }

        /* Screen 2: Recommendations Grid */
        .recommendations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 2rem;
        }

        .movie-rec-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            animation: card-fade-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .movie-rec-card:hover {
            transform: translateY(-8px);
            border-color: rgba(229, 9, 20, 0.35);
            box-shadow: var(--shadow-lg), 0 0 20px rgba(229, 9, 20, 0.15);
        }

        @keyframes card-fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Stagger animation delays for recommendation grid cards */
        .movie-rec-card:nth-child(1) { animation-delay: 0.05s; }
        .movie-rec-card:nth-child(2) { animation-delay: 0.1s; }
        .movie-rec-card:nth-child(3) { animation-delay: 0.15s; }
        .movie-rec-card:nth-child(4) { animation-delay: 0.2s; }
        .movie-rec-card:nth-child(5) { animation-delay: 0.25s; }
        .movie-rec-card:nth-child(6) { animation-delay: 0.3s; }
        .movie-rec-card:nth-child(7) { animation-delay: 0.35s; }
        .movie-rec-card:nth-child(8) { animation-delay: 0.4s; }
        .movie-rec-card:nth-child(9) { animation-delay: 0.45s; }
        .movie-rec-card:nth-child(10) { animation-delay: 0.5s; }

        .movie-poster-container {
            aspect-ratio: 2/3;
            width: 100%;
            position: relative;
            background: #090911;
            overflow: hidden;
            border-bottom: 1px solid var(--border-color);
        }

        .movie-poster-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .movie-rec-card:hover .movie-poster-img {
            transform: scale(1.05);
        }

        .movie-poster-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #16162a 0%, #0d0d1a 100%);
            color: var(--text-muted);
            padding: 1.5rem;
            text-align: center;
        }

        .movie-poster-placeholder .icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            filter: drop-shadow(0 0 10px rgba(229, 9, 20, 0.25));
        }

        .movie-poster-placeholder .fallback-title {
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .movie-details {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            flex: 1;
        }

        .movie-details-title {
            font-family: var(--font-display);
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text-primary);
        }

        .movie-meta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 0.5rem;
        }

        .movie-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            max-width: 60%;
        }

        .genre-badge {
            font-size: 0.6rem;
            padding: 0.15rem 0.35rem;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
        }

        .match-score {
            color: #22c55e;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.85rem;
            background: rgba(34, 197, 94, 0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 999px;
            border: 1px solid rgba(34, 197, 94, 0.15);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            box-shadow: none;
            margin-top: 1rem;
            align-self: flex-start;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-secondary);
        }

        /* Loading Skeletons */
        .skeleton-card {
            pointer-events: none;
        }

        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.02) 25%, rgba(255, 255, 255, 0.07) 50%, rgba(255, 255, 255, 0.02) 75%);
            background-size: 200% 100%;
            animation: skeleton-pulse 1.5s infinite ease-in-out;
        }

        @keyframes skeleton-pulse {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-header {
            height: 20px;
            width: 35px;
            border-radius: 4px;
        }

        .skeleton-title {
            height: 24px;
            width: 80%;
            border-radius: 4px;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .skeleton-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .skeleton-btn {
            height: 40px;
            flex: 1;
            border-radius: 999px;
        }

        /* Full Page Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(8, 8, 15, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .loading-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .loading-spinner-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
        }

        .recommender-spinner {
            width: 64px;
            height: 64px;
            border: 4px solid rgba(229, 9, 20, 0.1);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.2);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-spinner-container h3 {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .loading-spinner-container p {
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            z-index: 10000;
        }

        .toast {
            background: var(--bg-surface-elevated);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-left: 4px solid #10b981;
        }

        .toast.error {
            border-left: 4px solid var(--color-primary);
        }

        .toast.info {
            border-left: 4px solid #3b82f6;
        }

        /* Error state container in grid */
        .error-grid-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 1.5rem;
            background: rgba(229, 9, 20, 0.03);
            border: 1px dashed rgba(229, 9, 20, 0.2);
            border-radius: var(--radius-md);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .error-grid-state p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .btn-retry {
            background: var(--bg-surface-elevated);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.5rem 1.25rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-retry:hover {
            border-color: var(--color-primary);
            background: var(--bg-surface-hover);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header>
            <a href="#" class="brand">
                <span class="brand-logo">🎬</span>
                <h1>CineMatch India</h1>
            </a>
        </header>

        <!-- SCREEN 1: Onboarding Quiz -->
        <div id="screen-onboarding" class="screen content-card">
            <div class="welcome-card">
                <h2>Welcome to CineMatch India</h2>
                <p>An AI-powered Hindi movie recommendation assistant</p>
            </div>

            <!-- Name Input Card -->
            <div class="name-section">
                <label for="username-input" class="form-label">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                    </svg>
                    Enter your name to start:
                </label>
                <input type="text" id="username-input" class="input-text" placeholder="e.g. Rahul Kumar" autocomplete="off" required>
            </div>

            <!-- Movies Quiz -->
            <div>
                <div class="section-header">
                    <h3 class="section-title">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm3 2h6v4H7V5zm8 8v2h-2v-2h2zm-2-2V9h2v2h-2zm-2 2v2H7v-2h4zm2-11h2v2h-2V3zm0 4h2v2h-2V7zM3 5v2h2V5H3zm0 4h2v2H3V9zm2 4H3v2h2v-2z" clip-rule="evenodd" />
                        </svg>
                        Rate Movies
                    </h3>
                </div>
                
                <div id="movies-quiz-grid" class="movies-quiz-grid">
                    <!-- Movie cards loaded via JS -->
                </div>
            </div>

            <!-- Sticky Bottom Submission Bar -->
            <div id="recommendations-trigger-bar" class="trigger-bar hidden">
                <span id="rating-progress-text">0/5 rated</span>
                <button id="btn-get-recommendations" class="btn-submit" disabled>
                    Get Recommendations
                </button>
            </div>
        </div>

        <!-- SCREEN 2: Recommendations -->
        <div id="screen-recommendations" class="screen content-card hidden">
            <div class="section-header">
                <h2 class="section-title">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                    </svg>
                    Your Top Picks
                </h2>
            </div>
            
            <div id="recommendations-grid" class="recommendations-grid">
                <!-- Recommended Movie cards loaded via JS -->
            </div>

            <button id="btn-rate-more" class="btn-submit btn-secondary">
                Rate More Movies
            </button>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner-container">
            <div class="recommender-spinner"></div>
            <h3 id="loading-overlay-title">Synchronizing ratings...</h3>
            <p id="loading-overlay-desc">Please wait while the AI recommends movies</p>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <script>
        // Constants & State
        const API_BASE = "https://cinematch-india-1.onrender.com";
        let onboardingMovies = [];
        let userRatings = {}; // movieTitle -> score (-1, 0, or 1)
        
        // DOM Elements
        const screenOnboarding = document.getElementById("screen-onboarding");
        const screenRecommendations = document.getElementById("screen-recommendations");
        const moviesQuizGrid = document.getElementById("movies-quiz-grid");
        const usernameInput = document.getElementById("username-input");
        const recommendationsTriggerBar = document.getElementById("recommendations-trigger-bar");
        const ratingProgressText = document.getElementById("rating-progress-text");
        const btnGetRecommendations = document.getElementById("btn-get-recommendations");
        const recommendationsGrid = document.getElementById("recommendations-grid");
        const btnRateMore = document.getElementById("btn-rate-more");
        const loadingOverlay = document.getElementById("loading-overlay");
        const loadingOverlayTitle = document.getElementById("loading-overlay-title");
        const loadingOverlayDesc = document.getElementById("loading-overlay-desc");

        // Initialization
        window.addEventListener("DOMContentLoaded", () => {
            fetchOnboardingMovies();
            setupEventListeners();
        });

        function setupEventListeners() {
            // Check submit eligibility on inputting name
            usernameInput.addEventListener("input", () => {
                updateTriggerBar();
            });

            // Get recommendations click
            btnGetRecommendations.addEventListener("click", () => {
                submitRatingsAndGetRecommendations();
            });

            // Rate more movies (Screen 2 -> Screen 1)
            btnRateMore.addEventListener("click", () => {
                showScreen("screen-onboarding");
            });
        }

        // Display screens helper
        function showScreen(screenId) {
            if (screenId === "screen-onboarding") {
                screenRecommendations.classList.add("hidden");
                screenOnboarding.classList.remove("hidden");
            } else if (screenId === "screen-recommendations") {
                screenOnboarding.classList.add("hidden");
                screenRecommendations.classList.remove("hidden");
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Loading spinner control
        function showLoading(title, desc) {
            loadingOverlayTitle.textContent = title || "Processing...";
            loadingOverlayDesc.textContent = desc || "Please wait...";
            loadingOverlay.classList.add("visible");
        }

        function hideLoading() {
            loadingOverlay.classList.remove("visible");
        }

        // Toast notifications helper
        function showToast(message, type = "info") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = `toast ${type}`;
            
            let emoji = "ℹ️";
            if (type === "success") emoji = "✅";
            if (type === "error") emoji = "❌";
            
            toast.innerHTML = `<span style="font-size: 1.1rem">${emoji}</span><span style="font-size: 0.95rem; font-weight: 500">${message}</span>`;
            container.appendChild(toast);
            
            // Trigger reflow for transition
            toast.offsetHeight;
            toast.classList.add("show");
            
            setTimeout(() => {
                toast.classList.remove("show");
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // Render Skeletons for Onboarding Loader
        function renderOnboardingSkeletons() {
            moviesQuizGrid.innerHTML = "";
            for (let i = 0; i < 10; i++) {
                moviesQuizGrid.innerHTML += `
                    <div class="movie-quiz-card skeleton-card">
                        <div class="quiz-card-header">
                            <div class="skeleton skeleton-header"></div>
                            <div class="skeleton-header skeleton" style="width: 25px"></div>
                        </div>
                        <div class="skeleton skeleton-title"></div>
                        <div class="rating-buttons">
                            <div class="skeleton skeleton-btn"></div>
                            <div class="skeleton skeleton-btn"></div>
                            <div class="skeleton skeleton-btn"></div>
                        </div>
                    </div>
                `;
            }
        }

        // Fetch Onboarding Movies from API
        async function fetchOnboardingMovies() {
            renderOnboardingSkeletons();
            try {
                const response = await fetch(`${API_BASE}/onboarding`, {
                    headers: {
                        'Accept': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                    }
                });
                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }
                const data = await response.json();
                onboardingMovies = data.movies || [];
                renderOnboardingQuiz();
            } catch (error) {
                console.error("Error fetching onboarding movies:", error);
                showToast("Failed to fetch onboarding movies", "error");
                renderErrorState();
            }
        }

        // Render onboarding quiz cards
        function renderOnboardingQuiz() {
            moviesQuizGrid.innerHTML = "";
            if (onboardingMovies.length === 0) {
                moviesQuizGrid.innerHTML = `
                    <div class="error-grid-state">
                        <p>No movies available for onboarding quiz.</p>
                        <button class="btn-retry" onclick="fetchOnboardingMovies()">Retry</button>
                    </div>
                `;
                return;
            }

            onboardingMovies.forEach((movie, index) => {
                const card = document.createElement("div");
                card.className = "movie-quiz-card";
                
                // Active button classes if rated previously
                const currentRating = userRatings[movie];
                const dislikeActive = currentRating === -1 ? "active" : "";
                const mehActive = currentRating === 0 ? "active" : "";
                const likeActive = currentRating === 1 ? "active" : "";

                card.innerHTML = `
                    <div class="quiz-card-header">
                        <span class="quiz-card-icon">🎬</span>
                        <span class="quiz-card-number">#${index + 1}</span>
                    </div>
                    <h4 class="quiz-card-title">${movie}</h4>
                    <div class="rating-buttons">
                        <button type="button" class="btn-rate btn-dislike ${dislikeActive}" data-score="-1" title="Dislike">
                            <span class="emoji">👎</span>
                            <span class="label">Dislike</span>
                        </button>
                        <button type="button" class="btn-rate btn-meh ${mehActive}" data-score="0" title="Neutral">
                            <span class="emoji">😐</span>
                            <span class="label">Meh</span>
                        </button>
                        <button type="button" class="btn-rate btn-like ${likeActive}" data-score="1" title="Like">
                            <span class="emoji">👍</span>
                            <span class="label">Like</span>
                        </button>
                    </div>
                `;

                // Event listener on rate buttons
                const buttons = card.querySelectorAll(".btn-rate");
                buttons.forEach(button => {
                    button.addEventListener("click", () => {
                        const targetScore = parseInt(button.dataset.score);
                        if (button.classList.contains("active")) {
                            button.classList.remove("active");
                            delete userRatings[movie];
                        } else {
                            buttons.forEach(btn => btn.classList.remove("active"));
                            button.classList.add("active");
                            userRatings[movie] = targetScore;
                        }
                        updateTriggerBar();
                    });
                });

                moviesQuizGrid.appendChild(card);
            });
            updateTriggerBar();
        }

        // Render Error State
        function renderErrorState() {
            moviesQuizGrid.innerHTML = `
                <div class="error-grid-state">
                    <p>Failed to connect to movie server. Please ensure the backend is running.</p>
                    <button class="btn-retry" onclick="fetchOnboardingMovies()">Retry Connection</button>
                </div>
            `;
        }

        // Update progress count and enable/disable submit button
        function updateTriggerBar() {
            const ratedCount = Object.keys(userRatings).length;
            ratingProgressText.textContent = `${ratedCount}/5 rated`;
            
            if (ratedCount >= 5) {
                recommendationsTriggerBar.classList.remove("hidden");
                const currentName = usernameInput.value.trim();
                if (currentName.length > 0) {
                    btnGetRecommendations.removeAttribute("disabled");
                } else {
                    btnGetRecommendations.setAttribute("disabled", "true");
                }
            } else {
                recommendationsTriggerBar.classList.add("hidden");
            }
        }

        // Submit ratings to POST /rate and call GET /recommend
        async function submitRatingsAndGetRecommendations() {
            const name = usernameInput.value.trim();
            if (!name) {
                showToast("Please enter your name to get recommendations", "error");
                usernameInput.focus();
                return;
            }

            const ratingsToSubmit = Object.entries(userRatings);
            if (ratingsToSubmit.length < 5) {
                showToast("Please rate at least 5 movies first", "error");
                return;
            }

            showLoading("Saving your movie ratings...", "Sending ratings data to the backend AI");

            try {
                // Submit all ratings in parallel
                const submitPromises = ratingsToSubmit.map(([movieName, score]) => {
                    const url = `${API_BASE}/rate?username=${encodeURIComponent(name)}&movie=${encodeURIComponent(movieName)}&rating=${score}`;
                    return fetch(url, {
                        method: "GET",
                        headers: {
                            "ngrok-skip-browser-warning": "true"
                        }
                    }).then(res => {
                        if (!res.ok) {
                            throw new Error(`Failed to rate ${movieName}`);
                        }
                        return res.json();
                    });
                });

                await Promise.all(submitPromises);
                showToast("Ratings saved successfully!", "success");

                // Step 2: Fetch recommendations
                showLoading("Analyzing profile...", "Fetching your personalized recommendation matches");
                
                const recResponse = await fetch(`${API_BASE}/recommend?username=${encodeURIComponent(name)}`, {
                    headers: {
                        'ngrok-skip-browser-warning': 'true'
                    }
                });
                if (!recResponse.ok) {
                    throw new Error(`Recommendations request failed: ${recResponse.status}`);
                }

                const recData = await recResponse.json();
                
                if (recData.status === "ok" || (recData.recommendations && recData.recommendations.length > 0)) {
                    renderRecommendations(recData.recommendations);
                    showScreen("screen-recommendations");
                } else if (recData.status === "onboarding") {
                    showToast("Needs more onboarding ratings. Rate more movies!", "error");
                    hideLoading();
                } else {
                    throw new Error(recData.message || "Unknown error fetching recommendations");
                }
            } catch (error) {
                console.error("Submission failed:", error);
                showToast(`Request failed: ${error.message}`, "error");
            } finally {
                hideLoading();
            }
        }

        // Render recommended movies cards
        function renderRecommendations(recs) {
            recommendationsGrid.innerHTML = "";
            if (!recs || recs.length === 0) {
                recommendationsGrid.innerHTML = `
                    <div class="error-grid-state" style="grid-column: 1 / -1;">
                        <p>No movie recommendations matches found. Try going back and adjusting ratings.</p>
                    </div>
                `;
                return;
            }

            recs.forEach(movie => {
                const card = document.createElement("div");
                card.className = "movie-rec-card";

                // Format similarity match percentage
                const matchVal = movie.match ? Math.min(100, Math.max(0, Math.round(movie.match * 100))) : null;
                const matchBadge = matchVal !== null ? `<span class="match-score">${matchVal}% Match</span>` : '';

                // Handle poster paths
                let posterHtml = '';
                if (movie.poster_path) {
                    const posterUrl = movie.poster_path.startsWith('http') ? movie.poster_path : `https://image.tmdb.org/t/p/w500${movie.poster_path}`;
                    posterHtml = `<img src="${posterUrl}" class="movie-poster-img" alt="${movie.title} Poster" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`;
                }
                
                // Fallback inside poster container
                const fallbackHtml = `
                    <div class="movie-poster-placeholder" style="${movie.poster_path ? 'display: none;' : 'display: flex;'}">
                        <span class="icon">🎬</span>
                        <span class="fallback-title">${movie.title}</span>
                    </div>
                `;

                // Genres rendering
                const genresHtml = (movie.genres || []).slice(0, 2).map(g => `<span class="genre-badge">${g}</span>`).join('');

                card.innerHTML = `
                    <div class="movie-poster-container">
                        ${posterHtml}
                        ${fallbackHtml}
                    </div>
                    <div class="movie-details">
                        <h4 class="movie-details-title">${movie.title}</h4>
                        <div class="movie-meta-row">
                            <div class="movie-genres">
                                ${genresHtml}
                            </div>
                            ${matchBadge}
                        </div>
                    </div>
                `;

                recommendationsGrid.appendChild(card);
            });
        }
    </script>
</body>
</html>
